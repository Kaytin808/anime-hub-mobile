<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Anime Hub</title>
    <style>
      html,
      body {
        min-height: 100%;
        margin: 0;
        background: #07111f;
        color: #f2fbff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        text-align: center;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      p {
        max-width: 320px;
        margin: 0;
        color: #9fb9ca;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <div>
        <h1>Anime Hub</h1>
        <p>Starting the iPhone test wrapper. Make sure the mobile server is running on your local network.</p>
      </div>
    </main>
  </body>
</html>
