version: '3.8'
services:
  server:
    build: ./server
    command: npm run dev
    ports:
      - '4000:4000'
    volumes:
      - ./server:/app
    environment:
      - REALDEBRID_CLIENT_ID
      - REALDEBRID_CLIENT_SECRET
      - RD_USER_TOKEN
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: anime_dev
    ports:
      - '5432:5432'

  redis:
    image: redis:7
    ports:
      - '6379:6379'
